<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Read Aloud</h1>
      <span class="status" id="status">Stopped</span>
    </header>

    <div class="controls">
      <button id="btn-back" class="icon-btn" title="Previous sentence">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button id="btn-play" class="icon-btn primary" title="Play / Pause">
        <svg viewBox="0 0 24 24" id="icon-play"><polygon points="5,3 19,12 5,21"/></svg>
        <svg viewBox="0 0 24 24" id="icon-pause" class="hidden"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>
      </button>
      <button id="btn-forward" class="icon-btn" title="Next sentence">
        <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zm-10 6 8.5 6V6z" transform="scale(-1,1) translate(-24,0)"/></svg>
      </button>
      <button id="btn-stop" class="icon-btn" title="Stop">
        <svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
      </button>
    </div>

    <div class="setting">
      <label for="engine">Engine</label>
      <select id="engine">
        <option value="kokoro">Kokoro (local service)</option>
        <option value="edge">Edge TTS (built-in)</option>
      </select>
    </div>

    <div class="setting">
      <label for="speed">Speed</label>
      <div class="range-row">
        <input type="range" id="speed" min="0.5" max="3" step="0.25" value="1">
        <span id="speed-val">1×</span>
      </div>
    </div>

    <div class="setting kokoro-only" id="kokoro-voice-setting">
      <label for="kokoro-voice">Voice</label>
      <select id="kokoro-voice"></select>
    </div>

    <div class="setting edge-only hidden" id="edge-voice-setting">
      <label for="edge-voice">Voice</label>
      <select id="edge-voice"></select>
    </div>

    <div class="setting kokoro-only" id="service-url-setting">
      <label for="service-url">Service URL</label>
      <div class="service-row">
        <input type="text" id="service-url" placeholder="http://localhost:5423" spellcheck="false">
        <span id="service-dot" class="service-dot" title="Service status"></span>
      </div>
      <span id="service-hint" class="service-hint">Checking…</span>
    </div>

    <div class="setting kokoro-only" id="lmstudio-setting">
      <div class="lmstudio-header">
        <label for="lmstudio-url">LLM preprocessing</label>
        <label class="toggle" title="Reformat text before sending to Kokoro">
          <input type="checkbox" id="lmstudio-enabled">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="service-row" id="lmstudio-url-row">
        <input type="text" id="lmstudio-url" placeholder="http://localhost:1234" spellcheck="false">
        <span id="lmstudio-dot" class="service-dot" title="LLM service status"></span>
      </div>
      <span id="lmstudio-hint" class="service-hint"></span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
