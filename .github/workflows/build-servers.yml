name: Build standalone server binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── gemma-server ─────────────────────────────────────────────────────
          - server: gemma-server
            os: ubuntu-22.04
            platform: linux-x86_64
            llama_cmake_args: ""

          - server: gemma-server
            os: macos-14
            platform: macos-arm64
            llama_cmake_args: "-DGGML_METAL=on"

          - server: gemma-server
            os: macos-13
            platform: macos-x86_64
            llama_cmake_args: ""

          # ── kokoro-server ────────────────────────────────────────────────────
          - server: kokoro-server
            os: ubuntu-22.04
            platform: linux-x86_64
            llama_cmake_args: ""

          - server: kokoro-server
            os: macos-14
            platform: macos-arm64
            llama_cmake_args: ""

          - server: kokoro-server
            os: macos-13
            platform: macos-x86_64
            llama_cmake_args: ""

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.server }}-${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base dependencies
        env:
          SERVER: ${{ matrix.server }}
        run: |
          python -m pip install --upgrade pip
          pip install -r "$SERVER/requirements.txt"

      - name: Install llama-cpp-python (gemma-server only)
        if: matrix.server == 'gemma-server'
        env:
          CMAKE_ARGS: ${{ matrix.llama_cmake_args }}
        run: pip install llama-cpp-python

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        env:
          SERVER: ${{ matrix.server }}
        run: |
          cd "$SERVER"
          pyinstaller "$SERVER.spec" --distpath dist --workpath build

      - name: Rename binary with platform suffix
        env:
          SERVER: ${{ matrix.server }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          mv "$SERVER/dist/$SERVER" "$SERVER/dist/$SERVER-$PLATFORM"
          chmod +x "$SERVER/dist/$SERVER-$PLATFORM"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.server }}-${{ matrix.platform }}
          path: ${{ matrix.server }}/dist/${{ matrix.server }}-${{ matrix.platform }}

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
